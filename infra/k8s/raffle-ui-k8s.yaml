# ==========================================
# 1. DEPLOYMENT (Podlarni boshqarish)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: raffle-ui-deployment
  labels:
    app: raffle-ui
spec:
  replicas: 2 # Production uchun kamida 2 ta pod (yuqori barqarorlik)
  selector:
    matchLabels:
      app: raffle-ui
  template:
    metadata:
      labels:
        app: raffle-ui
    spec:
      containers:
      - name: raffle-ui
        image: golibjon/my-repo:1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        
        # Docker Compose'dagi resurs cheklovlari mosligi:
        resources:
          requests:
            cpu: "250m"      # Compose: cpus: '0.25'
            memory: "256Mi"  # Compose: memory: 256M
          limits:
            cpu: "500m"      # Compose: cpus: '0.50'
            memory: "512Mi"  # Compose: memory: 512M

        # Podning sog'lig'ini tekshirish (Healthchecks)
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 5

---
# ==========================================
# 2. SERVICE (Ichki tarmoq va Load Balancer)
# ==========================================
apiVersion: v1
kind: Service
metadata:
  name: raffle-ui-service
  labels:
    app: raffle-ui
spec:
  type: ClusterIP # Ingress orqali bog'lanish uchun eng toza yo'l
  ports:
  - port: 80          # Service ichki porti
    targetPort: 3000  # Podning haqiqiy porti (containerPort)
    protocol: TCP
    name: http
  selector:
    app: raffle-ui

---
# ==========================================
# 3. INGRESS (Tashqi domendan kirish darvozasi)
# ==========================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: raffle-ui-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: raffle.yourdomain.com # O'zingizning domeningizni yozasiz
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: raffle-ui-service
            port:
              number: 80